- type: custom-api
  title: Nginx Proxy Manager
  title-url: ${NPM_URL}
  cache: 1m
  url: ${NPM_URL}/api/tokens
  method: POST
  body-type: json
  body:
    identity: ${NPM_USER}
    secret: ${NPM_PASS}
  options:
    base-url: ${NPM_URL}
    domain-name: ${NPM_BASE}
    # --- Icon Mappings ---
    adguard: adguard-home
    dash: glance
    beszel: beszel
    sv1: proxmox
    sv2: proxmox
    sv3: proxmox
    pbs: proxmox
    pbs2: proxmox
    meili: meilisearch
    mongo: mongodb
    bitwarden: bitwarden
    npm: nginx-proxy-manager
    immich: immich

  template: |
    <style>
      .npm-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(17rem, 1fr));
        gap: 1rem;
        padding: 0.5rem 0;
      }
      .npm-card {
        background: var(--color-widget-background-highlight);
        border-radius: var(--border-radius);
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        text-decoration: none !important;
      }
      .npm-card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-0.1875rem);
        border-color: var(--color-primary);
      }
      .npm-card.is-disabled { opacity: 0.7; }
      .npm-card.is-disabled .npm-icon { filter: grayscale(1) opacity(0.6); }
      .npm-card.is-disabled .npm-name { opacity: 0.8; }
      .npm-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.625rem; }
      .npm-icon-name { display: flex; align-items: center; gap: 0.625rem; min-width: 0; }
      .npm-icon { width: 1.25rem; height: 1.25rem; object-fit: contain; flex-shrink: 0; }
      .npm-name { font-weight: 600; font-size: var(--font-size-h4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-primary); }
      .npm-status-dot { width: 0.5625rem; height: 0.5625rem; border-radius: 50%; flex-shrink: 0; }
      .status-up { background-color: var(--color-positive); box-shadow: 0 0 0.375rem var(--color-positive); }
      .status-down { background-color: var(--color-negative); box-shadow: 0 0 0.375rem var(--color-negative); }
      .npm-target { font-family: monospace; font-size: var(--font-size-h6); opacity: 0.45; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.125rem; }
      .npm-error { padding: 0.75rem; color: var(--color-negative); border-radius: var(--border-radius); background: var(--color-widget-background-highlight); }
    </style>

    {{ $baseURL     := .Options.StringOr "base-url" "" }}
    {{ $defaultIcon := "nginx-proxy-manager" }}

    {{ if eq .Response.StatusCode 200 }}
      {{ $accessToken := .JSON.String "token" }}
      {{ $proxyHosts  := newRequest (concat $baseURL "/api/nginx/proxy-hosts") | withHeader "Authorization" (print "Bearer " $accessToken) | getResponse }}

      <div class="npm-grid">
        {{ range $proxyHosts.JSON.Array "" }}
          {{ $isEnabled := .Bool "enabled" }}
          {{ $domain    := .String "domain_names.0" }}
          {{ $sub       := $domain | trimSuffix ($.Options.StringOr "domain-name" "") }}
          {{ $target    := concat (.String "forward_host") ":" (.String "forward_port") }}
          {{ $iconKey   := $.Options.StringOr $sub $sub }}

          <a href="{{ .String "forward_scheme" }}://{{ $domain }}" target="_blank" class="npm-card {{ if not $isEnabled }}is-disabled{{ end }}">
            <div class="npm-header">
              <div class="npm-icon-name">
                <img class="npm-icon"
                     src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/{{ $iconKey }}.svg"
                     onerror="this.src='https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/{{ $defaultIcon }}.svg'">
                <span class="npm-name">{{ $sub }}</span>
              </div>
              <span class="npm-status-dot {{ if $isEnabled }}status-up{{ else }}status-down{{ end }}"></span>
            </div>
            <div class="npm-target">➔ {{ $target }}</div>
          </a>
        {{ end }}
      </div>
    {{ else }}
      <div class="npm-error">NPM Error: Could not retrieve data.</div>
    {{ end }}
