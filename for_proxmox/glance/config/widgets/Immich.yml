- type: custom-api
  title: Immich Stats
  title-url: ${IMMICH_URL}
  cache: 10m
  url: ${IMMICH_URL}/api/server/statistics
  headers:
    x-api-key: ${IMMICH_API}
  subrequests:
    storage:
      url: ${IMMICH_URL}/api/server/storage
      headers:
        x-api-key: ${IMMICH_API}
  options:
    show-cards: true
    show-storage-bar: true
  template: |
    <style>
      .immich-cards { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
      .immich-card { display: flex; flex-direction: column; justify-content: space-between; background-color: var(--color-widget-background-highlight); border-radius: var(--border-radius); padding: 1.25rem; flex: 1; min-width: 12.5rem; }
      .immich-card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
      .immich-card-icon { width: 2.5rem; height: 2.5rem; color: var(--color-primary); flex-shrink: 0; }
      .immich-card-label { font-weight: 600; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 0.03rem; color: var(--color-text-highlight); }
      .immich-card-value { font-family: ui-monospace, monospace; font-size: 1.85rem; font-weight: 700; color: var(--color-text-highlight); word-break: break-all; text-align: center; }
      .immich-card-value .pad { color: var(--color-text-subdue); font-weight: 400; opacity: 0.6; }
      .immich-card-value .unit { font-size: var(--font-size-h3); font-weight: 500; color: var(--color-text-subdue); margin-left: 0.5rem; }
      .immich-storage { background-color: var(--color-widget-background-highlight); border-radius: var(--border-radius); padding: 1.25rem; }
      .immich-storage-title { font-weight: 600; color: var(--color-text-highlight); margin-bottom: 0.5rem; font-size: var(--font-size-h2); }
      .immich-storage-used { color: var(--color-text-highlight); font-size: var(--font-size-h4); margin-bottom: 0.75rem; font-weight: 500; }
      .immich-storage-pct { color: var(--color-text-subdue); font-size: var(--font-size-base); margin-bottom: 0.75rem; }
      .immich-storage-error { color: var(--color-negative); font-size: var(--font-size-base); margin-bottom: 0.75rem; }
      .immich-bar-track { height: 0.5rem; width: 100%; background-color: var(--color-progress-border); border-radius: 0.375rem; overflow: hidden; }
      .immich-bar-fill { height: 100%; background-color: var(--color-primary); border-radius: 0.375rem; transition: width 0.4s ease; }
    </style>

    {{ $photos      := .JSON.Int "photos" }}
    {{ $videos      := .JSON.Int "videos" }}
    {{ $usageBytes  := .JSON.Int "usage" }}
    {{ $usageGiB    := div (toFloat $usageBytes) 1073741824.0 }}
    {{ $storage     := .Subrequest "storage" }}
    {{ $storage_ok  := and (ge $storage.Response.StatusCode 200) (le $storage.Response.StatusCode 299) }}
    {{ $totalGiB    := 0.0 }}
    {{ $percentage  := 0.0 }}
    {{ $storageError := "" }}
    {{ if $storage_ok }}
      {{ $totalGiB  = div (toFloat ($storage.JSON.Int "diskSizeRaw")) 1073741824.0 }}
      {{ $percentage = $storage.JSON.Float "diskUsagePercentage" }}
    {{ else }}
      {{ $storageError = printf "%d %s" $storage.Response.StatusCode $storage.Response.Status }}
    {{ end }}
    {{ $showCards      := .Options.BoolOr "show-cards" true }}
    {{ $showStorageBar := .Options.BoolOr "show-storage-bar" true }}

    {{ if $showCards }}
    <div class="immich-cards">
      <!-- Photos Card -->
      <div class="immich-card">
        <div class="immich-card-header">
          <svg class="immich-card-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13.73,15L9.83,21.76C10.53,21.91 11.25,22 12,22C14.4,22 16.6,21.15 18.32,19.75L14.66,13.4M2.46,15C3.38,17.92 5.61,20.26 8.45,21.34L12.12,15M8.54,12L4.64,5.25C3,7 2,9.39 2,12C2,12.68 2.07,13.35 2.2,14H9.69M21.8,10H14.31L14.6,10.5L19.36,18.75C21,16.97 22,14.6 22,12C22,11.31 21.93,10.64 21.8,10M21.54,9C20.62,6.07 18.39,3.74 15.55,2.66L11.88,9M9.4,10.5L14.17,2.24C13.47,2.09 12.75,2 12,2C9.6,2 7.4,2.84 5.68,4.25L9.34,10.6L9.4,10.5Z"/>
          </svg>
          <span class="immich-card-label">Photos</span>
        </div>
        <div class="immich-card-value">
          {{ if lt $photos 10 }}<span class="pad">000000000</span>{{ else if lt $photos 100 }}<span class="pad">00000000</span>{{ else if lt $photos 1000 }}<span class="pad">0000000</span>{{ else if lt $photos 10000 }}<span class="pad">000000</span>{{ else if lt $photos 100000 }}<span class="pad">00000</span>{{ else if lt $photos 1000000 }}<span class="pad">0000</span>{{ end }}{{ $photos }}
        </div>
      </div>

      <!-- Videos Card -->
      <div class="immich-card">
        <div class="immich-card-header">
          <svg class="immich-card-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10,16.5V7.5L16,12M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/>
          </svg>
          <span class="immich-card-label">Videos</span>
        </div>
        <div class="immich-card-value">
          {{ if lt $videos 10 }}<span class="pad">000000000</span>{{ else if lt $videos 100 }}<span class="pad">00000000</span>{{ else if lt $videos 1000 }}<span class="pad">0000000</span>{{ else if lt $videos 10000 }}<span class="pad">000000</span>{{ else if lt $videos 100000 }}<span class="pad">00000</span>{{ else if lt $videos 1000000 }}<span class="pad">0000</span>{{ end }}{{ $videos }}
        </div>
      </div>

      <!-- Storage Card -->
      <div class="immich-card">
        <div class="immich-card-header">
          <svg class="immich-card-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11,2V22C5.9,21.5 2,17.2 2,12C2,6.8 5.9,2.5 11,2M13,2V11H22C21.5,6.2 17.8,2.5 13,2M13,13V22C17.7,21.5 21.5,17.8 22,13H13Z"/>
          </svg>
          <span class="immich-card-label">Storage</span>
        </div>
        <div class="immich-card-value">
          {{ $gib := printf "%.0f" $usageGiB }}
          {{ if lt $usageGiB 10.0 }}<span class="pad">000000000</span>{{ else if lt $usageGiB 100.0 }}<span class="pad">00000000</span>{{ else if lt $usageGiB 1000.0 }}<span class="pad">0000000</span>{{ end }}{{ $gib }}<span class="unit">GiB</span>
        </div>
      </div>
    </div>
    {{ end }}

    {{ if $showStorageBar }}
    <div class="immich-storage">
      <div class="immich-storage-title">Storage Space</div>
      {{ if gt $totalGiB 0.0 }}
        <div class="immich-storage-used">{{ printf "%.1f" $usageGiB }} GiB of {{ printf "%.1f" $totalGiB }} GiB used</div>
        <div class="immich-storage-pct">{{ printf "%.1f" $percentage }}% full</div>
      {{ else }}
        <div class="immich-storage-used">{{ printf "%.1f" $usageGiB }} GiB used</div>
        <div class="immich-storage-error">Total storage unavailable ({{ $storageError }}). Ensure API key has permission for /api/server/storage.</div>
      {{ end }}
      <div class="immich-bar-track">
        <div class="immich-bar-fill" style="width: {{ if gt $totalGiB 0.0 }}{{ printf "%.1f" $percentage }}%{{ else }}0%{{ end }};"></div>
      </div>
    </div>
    {{ end }}
