# =========================================================
#  TLP for ThinkPad T14 Gen 5 (Intel Ultra 7 155U)
#  Optimized for CachyOS & Meteor Lake Architecture
# =========================================================

# --- Genel Etkinleştirme ---
TLP_ENABLE=1
TLP_DEFAULT_MODE=AC

# --- İşlemci (CPU) Ayarları ---
# Meteor Lake için en verimli sürücü intel_pstate'dir.
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Enerji Performans Tercihi (EPP)
# Bataryada 'power' yerine 'balance_power' akıcılığı korur.
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# Turbo Boost kontrolü
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# --- Intel GPU (Intel Graphics) ---
# Ultra 7 155U GPU frekans yönetimi (1.95 GHz tepe noktası)
INTEL_GPU_MIN_FREQ_ON_AC=100
INTEL_GPU_MIN_FREQ_ON_BAT=100
INTEL_GPU_MAX_FREQ_ON_AC=1950
INTEL_GPU_MAX_FREQ_ON_BAT=800
INTEL_GPU_BOOST_FREQ_ON_AC=1950
INTEL_GPU_BOOST_FREQ_ON_BAT=1000

# --- Platform Profili (Lenovo ACPI) ---
# Fan ve güç limitlerini donanım seviyesinde ayarlar
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=low-power

# --- Depolama (NVMe & Disk) ---
# Modern ThinkPad'lerde NVMe için APST en önemli ayardır.
DISK_DEVICES="nvme0n1"
NVME_APST_ON_AC=1
NVME_APST_ON_BAT=1

# --- Ağ (Wi-Fi & Bluetooth) ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# Açılışta Bluetooth'u kapalı tutar (Pil tasarrufu için)
DEVICES_TO_DISABLE_ON_STARTUP="bluetooth"

# --- PCI Express (ASPM) ---
# Güç tasarrufu için kritik PCIe hattı yönetimi
PCIE_ASPM_ON_AC=performance
PCIE_ASPM_ON_BAT=powersupersave

# --- Runtime Power Management ---
# Boştaki cihazları (USB/PCIe) otomatik askıya alır
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=on

# --- USB Ayarları ---
USB_AUTOSUSPEND=1

# --- Ses Kartı ---
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
# Intel High Definition Audio için güç yönetimi
SOUND_POWER_SAVE_CONTROLLER=Y

# --- Batarya Sağlığı (ThinkPad Özel) ---
# Sürekli prizde kullanım için ideal 70-80 bandı
START_CHARGE_THRESH_BAT0=70
STOP_CHARGE_THRESH_BAT0=80

# Kapatırken radyo cihazlarını (wifi vb.) olduğu gibi bırak
RESTORE_DEVICE_STATE_ON_STARTUP=0
